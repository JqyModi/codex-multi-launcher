appId: local.codex.multiopen.helper
productName: Codex 多开助手
directories:
  output: dist-app
files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
  - package.json
mac:
  icon: build/icon.icns
  target:
    - zip
    - dir
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
win:
  icon: docs/landing/assets/app-icon.png
  executableName: Codex Profile Manager
  artifactName: Codex-Profile-Manager-${version}-${arch}.${ext}
  target:
    - portable
asar: true

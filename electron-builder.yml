appId: local.codex.multiopen.helper
productName: Codex 多开助手
publish:
  provider: github
  owner: JqyModi
  repo: codex-multi-launcher
directories:
  output: dist-app
files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
  - package.json
mac:
  icon: build/icon.icns
  artifactName: codex-profile-manager-${version}-${arch}-mac.${ext}
  target:
    - zip
    - dir
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
win:
  icon: docs/landing/assets/app-icon.png
  executableName: Codex Profile Manager
  signAndEditExecutable: false
  target:
    - nsis
    - portable
nsis:
  artifactName: Codex-Profile-Manager-Setup-${version}-${arch}.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
portable:
  artifactName: Codex-Profile-Manager-Portable-${version}-${arch}.${ext}
asar: true
